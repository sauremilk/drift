<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300"
     role="img" aria-label="drift — steer your agent before it ships">
  <title>drift</title>
  <desc>steer your agent before it ships</desc>

  <style>
    .mono {
      font-family: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono','Courier New',monospace;
    }
  </style>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#ff8c42" stroke-width="0.4" stroke-opacity="0.045"/>
      <line x1="0" y1="0" x2="0" y2="40" stroke="#ff8c42" stroke-width="0.4" stroke-opacity="0.045"/>
    </pattern>

    <radialGradient id="bgGlow" cx="50%" cy="50%" r="38%">
      <stop offset="0%"   stop-color="#1e0800" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="termClip">
      <rect x="73" y="50" width="754" height="229"/>
    </clipPath>

    <linearGradient id="ruleGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ff8c42" stop-opacity="0"/>
      <stop offset="26%"  stop-color="#ff8c42" stop-opacity="0.22"/>
      <stop offset="74%"  stop-color="#ff8c42" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff8c42" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="900" height="300" fill="#080c14"/>
  <rect width="900" height="300" fill="url(#grid)"/>
  <rect width="900" height="300" fill="url(#bgGlow)"/>

  <!-- terminal chrome -->
  <rect x="72" y="20" width="756" height="260" rx="7"
        fill="none" stroke="#ff8c42" stroke-width="0.9" stroke-opacity="0.18"/>
  <rect x="73" y="21" width="754" height="28" rx="7" fill="#120a04"/>
  <rect x="73" y="37" width="754" height="12" fill="#120a04"/>
  <rect x="73" y="49" width="754" height="0.7" fill="url(#ruleGrad)"/>
  <circle cx="96"  cy="35" r="4.8" fill="#6b1e00"/>
  <circle cx="113" cy="35" r="4.8" fill="#a05000"/>
  <circle cx="130" cy="35" r="4.8" fill="#d47800"/>
  <text x="450" y="39" text-anchor="middle" class="mono"
    font-size="9.5" letter-spacing="0.10em"
    fill="#3a1e08">agent — main.py</text>

  <!-- clipped to terminal interior -->
  <g clip-path="url(#termClip)">

    <!-- agent label -->
    <text x="102" y="78" class="mono"
      font-size="13" font-weight="600" letter-spacing="0.04em"
      fill="#ff8c42" opacity="0.55">✦ Agent</text>

    <!--
      Timeline:
        0.0 – 0.4 s  cursor blinks, empty
        0.4 – 1.2 s  types "draft" (hallucination)
        1.2 – 2.8 s  pause
        2.8 – 3.4 s  backspace deletes "draft"
        3.5 – 3.7 s  pause
        3.7 – 4.5 s  types "drift" (correct)
        4.5 s +       cursor blinks, done

      Char positions (center, ~72px advance):
        306  378  450  522  594
    -->

    <!-- "draft" — hallucination, typed then deleted -->
    <g class="mono" font-size="120" font-weight="500" fill="#ffd966" text-anchor="middle">
      <text x="306" y="195" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.01s" begin="0.4s" fill="freeze"/>
        <animate attributeName="opacity" to="0" dur="0.01s" begin="3.4s" fill="freeze"/>d</text>
      <text x="378" y="195" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.01s" begin="0.6s" fill="freeze"/>
        <animate attributeName="opacity" to="0" dur="0.01s" begin="3.25s" fill="freeze"/>r</text>
      <text x="450" y="195" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.01s" begin="0.8s" fill="freeze"/>
        <animate attributeName="opacity" to="0" dur="0.01s" begin="3.1s" fill="freeze"/>a</text>
      <text x="522" y="195" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.01s" begin="1.0s" fill="freeze"/>
        <animate attributeName="opacity" to="0" dur="0.01s" begin="2.95s" fill="freeze"/>f</text>
      <text x="594" y="195" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.01s" begin="1.2s" fill="freeze"/>
        <animate attributeName="opacity" to="0" dur="0.01s" begin="2.8s" fill="freeze"/>t</text>
    </g>

    <!-- "drift" — correct, permanent -->
    <g class="mono" font-size="120" font-weight="500" fill="#ffd966" text-anchor="middle">
      <text x="306" y="195" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.01s" begin="3.7s" fill="freeze"/>d</text>
      <text x="378" y="195" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.01s" begin="3.9s" fill="freeze"/>r</text>
      <text x="450" y="195" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.01s" begin="4.1s" fill="freeze"/>i</text>
      <text x="522" y="195" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.01s" begin="4.3s" fill="freeze"/>f</text>
      <text x="594" y="195" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.01s" begin="4.5s" fill="freeze"/>t</text>
    </g>

    <!-- cursor — follows typing position -->
    <rect x="270" y="112" width="2.5" height="90" fill="#ffd966" rx="1">
      <animate attributeName="x" calcMode="discrete" dur="4.7s" fill="freeze"
        keyTimes="0;     0.085; 0.128; 0.170; 0.213; 0.255;
                  0.596; 0.627; 0.660; 0.691; 0.723;
                  0.787; 0.830; 0.872; 0.915; 0.957; 1"
        values="  270;   342;   414;   486;   558;   630;
                  558;   486;   414;   342;   270;
                  342;   414;   486;   558;   630;   630"/>
      <animate attributeName="opacity" values="1;0;1" keyTimes="0;0.5;1"
        dur="1.0s" repeatCount="indefinite"/>
    </rect>

  </g>
</svg>
