name: Drift Score Gate

# Two-lane drift score check:
#   default-lane — drift.yaml (calibrated, path exclusions active)
#   strict-lane  — drift.strict.yaml (no calibration, no path suppression, fail_on: medium)
#
# score-compare summarises the delta so reviewers can see how many findings
# the default config suppresses via path_overrides.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      strict_score_ceiling:
        description: "Strict-lane drift_score ceiling (0–1). Fail if score exceeds this."
        required: false
        default: "0.70"
        type: string
      delta_ceiling:
        description: "Max allowed strict_score - default_score delta. Fail if exceeded."
        required: false
        default: "0.25"
        type: string

permissions:
  contents: read

concurrency:
  group: "score-gate-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  # ── Lane 1: default config (informational, never fails) ─────────────────────
  default-lane:
    name: Score — default config
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      score: ${{ steps.capture.outputs.score }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: ./.github/actions/python-setup
        with:
          python-version: "3.12"

      - name: Run drift (default config)
        id: capture
        shell: bash
        run: |
          drift analyze --repo . --format json --exit-zero > drift_default.json
          SCORE=$(python -c "import json; d=json.load(open('drift_default.json')); print(d.get('drift_score', 0))")
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "Default drift_score: $SCORE"

  # ── Lane 2: strict config (enforces fail_on: medium gate) ───────────────────
  strict-lane:
    name: Score — strict config
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      score: ${{ steps.capture.outputs.score }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: ./.github/actions/python-setup
        with:
          python-version: "3.12"

      - name: "Run drift (strict config, fail_on: medium)"
        id: capture
        shell: bash
        run: |
          drift analyze --repo . --config drift.strict.yaml --format json --exit-zero > drift_strict.json
          SCORE=$(python -c "import json; d=json.load(open('drift_strict.json')); print(d.get('drift_score', 0))")
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "Strict drift_score: $SCORE"

  # ── Score comparison (always runs; enforces ceiling + delta thresholds) ──────
  score-compare:
    name: Score delta report
    runs-on: ubuntu-latest
    needs: [default-lane, strict-lane]
    if: always()
    steps:
      - name: Compare scores and enforce thresholds
        shell: bash
        env:
          DEFAULT_SCORE: ${{ needs.default-lane.outputs.score }}
          STRICT_SCORE: ${{ needs.strict-lane.outputs.score }}
          STRICT_CEILING: ${{ inputs.strict_score_ceiling || '0.70' }}
          DELTA_CEILING: ${{ inputs.delta_ceiling || '0.25' }}
        run: |
          python - <<'EOF'
          import os, sys

          def _f(key, fallback=0.0):
              try:
                  return float(os.environ.get(key, fallback))
              except (TypeError, ValueError):
                  return fallback

          default   = _f("DEFAULT_SCORE")
          strict    = _f("STRICT_SCORE")
          s_ceil    = _f("STRICT_CEILING", 0.70)
          d_ceil    = _f("DELTA_CEILING",  0.25)
          delta     = strict - default

          print("=" * 52)
          print("Drift score gate — two-lane comparison")
          print("=" * 52)
          print(f"  Default config (drift.yaml):        {default:.3f}")
          print(f"  Strict  config (drift.strict.yaml): {strict:.3f}")
          print(f"  Delta   (strict - default):         {delta:+.3f}")
          print(f"  Strict ceiling threshold:           {s_ceil:.2f}")
          print(f"  Delta  ceiling threshold:           {d_ceil:.2f}")
          print("=" * 52)

          failures = []
          if strict > s_ceil:
              failures.append(
                  f"FAIL: strict score {strict:.3f} exceeds ceiling {s_ceil:.2f}"
              )
          if delta > d_ceil:
              failures.append(
                  f"FAIL: delta {delta:+.3f} exceeds ceiling {d_ceil:.2f} — "
                  "suppressed signals are hiding too many medium/high findings"
              )

          if failures:
              for msg in failures:
                  print(msg)
              sys.exit(1)

          print("Score gate passed.")
          EOF
