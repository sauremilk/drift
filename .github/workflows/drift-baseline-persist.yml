# drift-baseline-persist.yml
#
# Purpose:  After every merge to main, snapshot the drift score as a
#           versioned JSON file on the dedicated `drift-history` orphan
#           branch.  This provides the CI-side time series that `drift trend`
#           (which is git-history-dependent and branch-neutral) cannot persist
#           on its own.  The snapshots serve as the data foundation for the
#           future Trend-Gate feature (Roadmap Item 06, CLI/Core layer).
#
# Trigger:  push › main  (also workflow_dispatch for manual test runs)
#
# Deps:     drift ci --format json --fail-on none
#
# Exclusions:
#   - Does NOT run drift ci again if action.yml is already active in the same
#     workflow run (these are independent workflows; no shared job context).
#   - Does NOT post a PR comment (action.yml owns that responsibility).
#   - Does NOT enforce a score ratchet (Roadmap Item 06, CLI/Core).
#
# Branch strategy:
#   `drift-history` is a git orphan branch — it shares no history with main.
#   Snapshots are committed there with [skip ci] to prevent trigger loops.
#   The branch is created automatically on first run if it does not exist.
#   At most 365 snapshots are retained; older ones are pruned automatically.

name: Drift — Baseline Persist

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "drift-baseline-${{ github.sha }}"
  cancel-in-progress: true

jobs:
  persist-snapshot:
    name: Persist drift score snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout with full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install drift-analyzer
        run: pip install --quiet drift-analyzer

      # Run analysis and write the snapshot to RUNNER_TEMP so it survives the
      # branch switch below.  --fail-on none ensures the step never blocks the
      # workflow regardless of the score.
      - name: Run drift ci and capture snapshot
        id: capture
        run: |
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          SHA_SHORT="${GITHUB_SHA:0:8}"
          SNAPSHOT_NAME="score-${TIMESTAMP}-${SHA_SHORT}.json"
          SNAPSHOT_PATH="${RUNNER_TEMP}/${SNAPSHOT_NAME}"

          drift ci --repo . --format json --fail-on none > "${SNAPSHOT_PATH}"

          echo "snapshot-name=${SNAPSHOT_NAME}" >> "${GITHUB_OUTPUT}"
          echo "snapshot-path=${SNAPSHOT_PATH}" >> "${GITHUB_OUTPUT}"

          # Extract key metrics for the step summary (written later after branch work)
          SCORE=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('${SNAPSHOT_PATH}'))
              print(f\"{d['drift_score']:.3f}\")
          except Exception as e:
              print('N/A')
          ")
          GRADE=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('${SNAPSHOT_PATH}'))
              print(d.get('grade', 'N/A'))
          except Exception:
              print('N/A')
          ")
          COUNT=$(python3 -c "
          import json
          try:
              d = json.load(open('${SNAPSHOT_PATH}'))
              print(len(d.get('findings', [])))
          except Exception:
              print('N/A')
          ")
          SEVERITY=$(python3 -c "
          import json
          try:
              d = json.load(open('${SNAPSHOT_PATH}'))
              print(d.get('severity', 'N/A').upper())
          except Exception:
              print('N/A')
          ")

              {
                echo "score=${SCORE}"
                echo "grade=${GRADE}"
                echo "count=${COUNT}"
                echo "severity=${SEVERITY}"
              } >> "${GITHUB_OUTPUT}"

      # Switch to (or create) the drift-history orphan branch.
      # The orphan branch shares no history with main, keeping it lightweight.
      - name: Switch to drift-history branch
        run: |
          git fetch origin drift-history || true

          if git show-ref --verify refs/remotes/origin/drift-history 2>/dev/null; then
            git checkout -b drift-history --track origin/drift-history
          else
            git checkout --orphan drift-history
            # Remove all tracked files from the working tree (empty starting point)
            git rm -rf . --quiet || true
          fi

      # Copy the snapshot from RUNNER_TEMP into the branch working directory.
      - name: Copy snapshot into drift-history branch
        run: |
          cp "${{ steps.capture.outputs.snapshot-path }}" \
             "${{ steps.capture.outputs.snapshot-name }}"

      # Keep at most 365 snapshots to bound repository growth.
      - name: Prune old snapshots (keep latest 365)
        run: |
          FILE_COUNT=$(find . -maxdepth 1 -type f -name 'score-*.json' | wc -l)
          if [ "${FILE_COUNT}" -gt 365 ]; then
            find . -maxdepth 1 -type f -name 'score-*.json' -printf '%T@ %p\n' \
              | sort -nr \
              | tail -n +366 \
              | cut -d' ' -f2- \
              | xargs -r rm -f
            echo "Pruned $((FILE_COUNT - 365)) old snapshot(s)."
          else
            echo "Snapshot count ${FILE_COUNT} — no pruning needed."
          fi

      # Commit and push the new snapshot.
      # [skip ci] prevents this commit from re-triggering the workflow.
      - name: Commit and push snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add score-*.json

          if git diff --cached --quiet; then
            echo "No snapshot changes to commit (identical content)."
          else
            git commit -m "chore(drift): score snapshot ${GITHUB_SHA:0:8} [skip ci]"
            git push origin drift-history
          fi

      # Write a concise step summary — PR comments are owned by action.yml.
      - name: Write step summary
        if: always()
        run: |
          {
            echo "## Drift Score Snapshot"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| **Score** | \`${{ steps.capture.outputs.score }}\` |"
            echo "| **Grade** | \`${{ steps.capture.outputs.grade }}\` |"
            echo "| **Severity** | \`${{ steps.capture.outputs.severity }}\` |"
            echo "| **Findings** | \`${{ steps.capture.outputs.count }}\` |"
            echo "| **SHA** | \`${GITHUB_SHA:0:8}\` |"
            echo "| **Snapshot** | \`${{ steps.capture.outputs.snapshot-name }}\` |"
            echo ""
            echo "<sub>Persisted to branch \`drift-history\` · Trend-Gate data foundation (Roadmap Item 06)</sub>"
          } >> "${GITHUB_STEP_SUMMARY}"

      # Keep the snapshot as a GitHub Actions artefact for 90 days as a
      # secondary retrieval path (e.g. before drift-history branch exists).
      - name: Upload snapshot artefact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: drift-score-snapshot-${{ github.sha }}
          path: ${{ steps.capture.outputs.snapshot-path }}
          retention-days: 90
