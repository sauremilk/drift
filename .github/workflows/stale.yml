name: Stale

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: "stale"
  cancel-in-progress: true

jobs:
  stale:
    # NOTE: Uses GitHub-hosted Windows runner.
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in the last 90 days. It will be closed in 30 days if no further
            activity occurs. If this issue is still relevant, please leave a comment
            or remove the stale label.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            activity in the last 60 days. It will be closed in 14 days if no further
            activity occurs.
          days-before-stale: 90
          days-before-close: 30
          days-before-pr-stale: 60
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "good first issue,help wanted,signal-quality"
          exempt-pr-labels: "help wanted"
