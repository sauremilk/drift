# Drift Self-Improvement Loop (DSOL) — ADR-097 / ADR-098.
#
# Runs once a week (and on manual dispatch). Executes one bounded
# DSOL cycle, uploads the proposals.json + summary.md artefact, and
# pings the maintainer via the workflow run summary. Does NOT open
# PRs, does NOT comment on issues, does NOT push commits — fully
# consistent with the repo "kein ungefragtes Posten" policy.

name: Drift — Self-Improvement Loop

on:
  schedule:
    # Every Sunday at 04:17 UTC. Off-peak so it never collides with
    # release jobs.
    - cron: "17 4 * * 0"
  workflow_dispatch:
    inputs:
      max-proposals:
        description: Hard cap on proposals per cycle.
        required: false
        type: string
        default: "10"
      enable-writeback:
        description: >
          Apply action artefacts after the cycle (Score-Gate + Convergence-Gate
          must pass). NEVER enabled by cron — opt-in only.
        required: false
        type: boolean
        default: false
      min-proposal-score:
        description: Minimum proposal score — proposals below this threshold are dropped.
        required: false
        type: string
        default: "0"

permissions:
  contents: read

concurrency:
  group: drift-self-improvement-loop
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install drift
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run self-scan (best-effort)
        # Best-effort: if it fails, DRIFT_SELF_SCAN_FAILED=1 is set so the
        # DSOL engine can annotate the report with a staleness warning.
        id: self_scan
        continue-on-error: true
        run: |
          drift analyze --repo . --format json --output benchmark_results/drift_self.json --exit-zero

      - name: Run DSOL cycle
        env:
          DRIFT_DSOL_MAX: ${{ inputs.max-proposals || '10' }}
          DRIFT_MIN_SCORE: ${{ inputs.min-proposal-score || '0' }}
          DRIFT_SELF_SCAN_FAILED: ${{ steps.self_scan.outcome == 'failure' && '1' || '' }}
        run: |
          drift self-improve run \
            --max-proposals "${DRIFT_DSOL_MAX}" \
            --min-score "${DRIFT_MIN_SCORE}" \
            --format text

      - name: Locate cycle artefacts
        id: locate
        run: |
          set -euo pipefail
          CYCLE_DIR="$(find work_artifacts/self_improvement -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)/"
          if [ "${CYCLE_DIR}" = "/" ]; then
            echo "No DSOL cycle directory found under work_artifacts/self_improvement" >&2
            exit 1
          fi
          echo "cycle_dir=${CYCLE_DIR}" >> "$GITHUB_OUTPUT"
          echo "Cycle dir: ${CYCLE_DIR}"

      - name: Render summary into job summary
        run: |
          if [ -f "${{ steps.locate.outputs.cycle_dir }}summary.md" ]; then
            cat "${{ steps.locate.outputs.cycle_dir }}summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload cycle artefact
        uses: actions/upload-artifact@v4
        with:
          name: dsol-cycle-${{ github.run_id }}
          path: |
            work_artifacts/self_improvement/**
            .drift/self_improvement_ledger.jsonl
          if-no-files-found: warn
          retention-days: 90

  # ---------------------------------------------------------------------------
  # writeback — opt-in only (inputs.enable-writeback == true).
  # Runs Score-Gate + Convergence-Gate before applying action artefacts.
  # Never triggered by cron — safe by design.
  # ---------------------------------------------------------------------------
  writeback:
    needs: cycle
    if: ${{ inputs.enable-writeback == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install drift
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Download cycle artefact
        uses: actions/download-artifact@v4
        with:
          name: dsol-cycle-${{ github.run_id }}
          path: dsol_cycle_download

      - name: Fetch baseline score from drift-history
        id: baseline
        run: |
          set -euo pipefail
          git fetch origin drift-history:refs/remotes/origin/drift-history 2>/dev/null || true
          BASELINE=$(git show origin/drift-history:kpi_snapshot.json 2>/dev/null \
            | python -c "import json,sys; d=json.load(sys.stdin); print(d.get('composite_score', 'null'))" \
            2>/dev/null || echo 'null')
          echo "baseline_score=${BASELINE}" >> "$GITHUB_OUTPUT"
          echo "Baseline score: ${BASELINE}"

      - name: Score-Gate (CP2)
        run: |
          set -euo pipefail
          PROPOSALS=$(find dsol_cycle_download/work_artifacts/self_improvement -name "proposals.json" 2>/dev/null | tail -n1)
          CURRENT=$(python -c "
          import json, pathlib
          snap = pathlib.Path('benchmark_results/kpi_snapshot.json')
          if snap.exists():
              d = json.loads(snap.read_text())
              print(d.get('composite_score', 0))
          else:
              print(0)
          ")
          python scripts/validate_proposals.py \
            --proposals "${PROPOSALS}" \
            --baseline "${{ steps.baseline.outputs.baseline_score }}" \
            --current-score "${CURRENT}" \
            --min-score "${{ inputs.min-proposal-score || '0' }}" \
            --fail-on-regression

      - name: Convergence-Gate (CP3)
        run: |
          python scripts/check_dsol_convergence.py \
            --ledger dsol_cycle_download/.drift/self_improvement_ledger.jsonl \
            --window 4 \
            --fail-on-stagnation

      - name: Apply action artefacts (ADR-098 write-back)
        run: |
          set -euo pipefail
          PROPOSALS=$(find dsol_cycle_download/work_artifacts/self_improvement -name "proposals.json" 2>/dev/null | tail -n1)
          drift self-improve apply \
            --proposals "${PROPOSALS}" \
            --output-dir work_artifacts/dsol_actions \
            --format text

      - name: Commit action artefacts
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add work_artifacts/dsol_actions/ || true
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "chore(dsol): apply cycle ${{ github.run_id }} artefacts [skip ci]"
          git push
