name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  release:
    # Run immediately when a GitHub release is created so PyPI is always
    # produced as part of release creation (not only after manual publish).
    types: [created]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag in Form vX.Y.Z für manuelle Veröffentlichung"
        required: true
        type: string

jobs:
  validate-version:
    name: Validate tag & version consistency
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check SemVer tag matches pyproject.toml
        # Fails if the tag is not vMAJOR.MINOR.PATCH or doesn't match
        # the version field in pyproject.toml. Abort before any build.
        shell: powershell
        run: |
          $tag = "${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
          python scripts/check_version.py --tag $tag

      - name: Enforce release discipline
        run: python scripts/check_release_discipline.py

  publish:
    name: Build and publish to PyPI
    needs: validate-version
    runs-on: self-hosted
    environment: pypi
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN || secrets.PYPI_RELEASE }}
    permissions:
      id-token: write # Trusted publishing — no API key needed

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI (API token)
        if: env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ env.PYPI_API_TOKEN }}

      - name: Publish to PyPI (Trusted publishing fallback)
        if: env.PYPI_API_TOKEN == ''
        uses: pypa/gh-action-pypi-publish@release/v1

  update-major-tag:
    name: Update major-version tag (e.g. v1 → latest patch)
    needs: publish
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Move major-version tag
        # Parses "v1.2.3" → "v1" and force-updates the tag so that
        # users pinning `uses: sauremilk/drift@v1` always get the
        # latest compatible release automatically.
        shell: powershell
        run: |
          $tag = "${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Output "Tag $tag does not match vMAJOR.MINOR.PATCH - skipping major-tag update"
            exit 0
          }
          $major = [regex]::Match($tag, '^v\d+').Value
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f $major
          git push -f origin $major
          Write-Output "Moved $major -> $tag"
