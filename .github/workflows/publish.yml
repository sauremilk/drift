name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag in Form vX.Y.Z für manuelle Veröffentlichung"
        required: true
        type: string

concurrency:
  group: "publish-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
  cancel-in-progress: true

jobs:
  validate-version:
    name: Validate tag & version consistency
    # NOTE: Uses GitHub-hosted Windows runner.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Resolve Python executable
        shell: powershell
        run: |
          $resolved = $false
          if (Get-Command python -ErrorAction SilentlyContinue) {
            python --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=python" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved -and (Get-Command py -ErrorAction SilentlyContinue)) {
            py --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=py" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved) {
            Write-Error "Neither 'python' nor 'py' is available on this runner."
            exit 1
          }

      - name: Check SemVer tag matches pyproject.toml
        # Fails if the tag is not vMAJOR.MINOR.PATCH or doesn't match
        # the version field in pyproject.toml. Abort before any build.
        shell: powershell
        run: |
          $tag = "${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
          & $env:PYTHON_BIN scripts/check_version.py --tag $tag

      - name: Enforce release discipline
        shell: powershell
        run: |
          & $env:PYTHON_BIN scripts/check_release_discipline.py

  publish:
    name: Build and publish to PyPI
    needs: validate-version
    # NOTE: Uses GitHub-hosted Windows runner.
    runs-on: windows-latest
    environment: pypi
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_RELEASE }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Resolve Python executable
        shell: powershell
        run: |
          $resolved = $false
          if (Get-Command python -ErrorAction SilentlyContinue) {
            python --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=python" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved -and (Get-Command py -ErrorAction SilentlyContinue)) {
            py --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=py" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved) {
            Write-Error "Neither 'python' nor 'py' is available on this runner."
            exit 1
          }

      - name: Install build tools
        shell: powershell
        run: |
          & $env:PYTHON_BIN -m pip install --upgrade build twine

      - name: Build wheel and sdist
        shell: powershell
        run: |
          & $env:PYTHON_BIN -m build

      - name: Publish to PyPI (API token)
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PYPI_API_TOKEN)) {
            Write-Error "Neither PYPI_API_TOKEN nor PYPI_RELEASE secret is configured."
            exit 1
          }
          $env:TWINE_USERNAME = "__token__"
          $env:TWINE_PASSWORD = $env:PYPI_API_TOKEN
          & $env:PYTHON_BIN -m twine upload --non-interactive --skip-existing dist/*

  update-major-tag:
    name: Update major-version tag (e.g. v1 → latest patch)
    needs: publish
    # NOTE: Uses GitHub-hosted Windows runner.
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Move major-version tag
        # Parses "v1.2.3" → "v1" and force-updates the tag so that
        # users pinning `uses: mick-gsk/drift@v1` always get the
        # latest compatible release automatically.
        shell: powershell
        run: |
          $tag = "${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Output "Tag $tag does not match vMAJOR.MINOR.PATCH - skipping major-tag update"
            exit 0
          }
          $major = [regex]::Match($tag, '^v\d+').Value
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f $major
          git push -f origin $major
          Write-Output "Moved $major -> $tag"
