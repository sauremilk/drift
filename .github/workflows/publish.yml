name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag in Form vX.Y.Z für manuelle Veröffentlichung"
        required: true
        type: string

concurrency:
  group: "publish-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-version:
    name: Validate tag & version consistency
    # NOTE: Uses GitHub-hosted Windows runner.
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Resolve Python executable
        shell: powershell
        run: |
          $resolved = $false
          if (Get-Command python -ErrorAction SilentlyContinue) {
            python --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=python" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved -and (Get-Command py -ErrorAction SilentlyContinue)) {
            py --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=py" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved) {
            Write-Error "Neither 'python' nor 'py' is available on this runner."
            exit 1
          }

      - name: Check SemVer tag matches pyproject.toml
        # Fails if the tag is not vMAJOR.MINOR.PATCH or doesn't match
        # the version field in pyproject.toml. Abort before any build.
        shell: powershell
        run: |
          $tag = "${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
          & $env:PYTHON_BIN scripts/check_version.py --tag $tag

      - name: Enforce release discipline
        shell: powershell
        run: |
          & $env:PYTHON_BIN scripts/check_release_discipline.py

  publish:
    name: Build and publish to PyPI
    needs: validate-version
    # NOTE: Uses ubuntu-latest — pypa/gh-action-pypi-publish requires a Linux runner.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      contents: read
      id-token: write      # required for Trusted Publisher (OIDC) and sigstore attestation
      attestations: write  # required for actions/attest-build-provenance

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tools
        run: pip install --upgrade build

      - name: Build wheel and sdist
        run: python -m build

      - name: Generate SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom --quiet
          python -m cyclonedx_py environment --output-format JSON --outfile drift-sbom.json

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        # Requires a Trusted Publisher configured in PyPI project settings:
        # https://docs.pypi.org/trusted-publishers/
        # Publisher: GitHub Actions · owner: mick-gsk · repo: drift
        # Workflow: publish.yml · environment: pypi
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          attestations: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@6149ea5740be74af77f260b9db67e633f6b0a9a1  # v2.1.3
        with:
          subject-path: dist/*

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: drift-sbom-${{ github.ref_name }}
          path: drift-sbom.json
          retention-days: 90

  update-major-tag:
    name: Update major-version tag (e.g. v1 → latest patch)
    needs: publish
    # NOTE: Uses GitHub-hosted Windows runner.
    runs-on: windows-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Move major-version tag
        # Parses "v1.2.3" → "v1" and force-updates the tag so that
        # users pinning `uses: mick-gsk/drift@v1` always get the
        # latest compatible release automatically.
        shell: powershell
        run: |
          $tag = "${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Output "Tag $tag does not match vMAJOR.MINOR.PATCH - skipping major-tag update"
            exit 0
          }
          $major = [regex]::Match($tag, '^v\d+').Value
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f $major
          git push -f origin $major
          Write-Output "Moved $major -> $tag"
