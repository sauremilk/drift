name: "Quality Loop - MCTS (nightly)"

on:
  schedule:
    # 01:00 UTC every night
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      mcts_budget:
        description: "MCTS iteration budget"
        required: false
        default: "50"
      dry_run:
        description: "Dry-run (no commits)"
        required: false
        default: "false"

concurrency:
  group: quality-loop-main-branch
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  mcts-quality-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (dev + autopatch)
        run: pip install -e '.[dev,autopatch]'

      - name: Run MCTS quality loop
        id: mcts_run
        env:
          MCTS_BUDGET: ${{ github.event.inputs.mcts_budget || '50' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          DRY_RUN_FLAG=""
          if [ "$DRY_RUN" = "true" ]; then DRY_RUN_FLAG="--dry-run"; fi
          python -m scripts.quality_loop run \
            --mode mcts \
            --src src/drift \
            --mcts-budget "$MCTS_BUDGET" \
            --min-improvement 0.01 \
            $DRY_RUN_FLAG \
            --output-json mcts_result.json \
            --exit-zero

      - name: Upload MCTS result artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcts_result
          path: mcts_result.json
          retention-days: 30

      - name: Multi-seed evaluation (gate check)
        id: evaluate
        run: |
          python -m scripts.quality_loop evaluate \
            --src scripts/quality_loop/demo_corpus \
            --mode mcts \
            --mcts-budget 10 \
            --seeds 11,22,33,44,55 \
            --min-improvement 0.01 \
            --min-median 0.01 \
            --min-positive-rate 0.70 \
            --drift-tolerance 0.005 \
            --output-json eval_result.json \
            --exit-zero
          GATE_PASS=$(python -c "import json,os; d=json.load(open('eval_result.json')) if os.path.exists('eval_result.json') else {}; print(str(d.get('gate_pass',False)).lower())" 2>/dev/null || echo "false")
          echo "gate_pass=$GATE_PASS" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload evaluation result artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval_result
          path: eval_result.json
          retention-days: 30

      - name: Commit improvements via PR
        if: |
          github.event.inputs.dry_run != 'true' &&
          steps.evaluate.outputs.gate_pass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
          else
            BRANCH="quality-loop/mcts-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git add -A src/drift/
            git commit -m "chore: MCTS quality loop improvement"
            git push origin "$BRANCH"
            gh pr create \
              --title "chore: MCTS quality loop improvement" \
              --body "Automated quality loop improvement from MCTS nightly run. Gate passed." \
              --base main \
              --draft
          fi

      - name: Report gate block (no apply)
        if: |
          github.event.inputs.dry_run != 'true' &&
          steps.evaluate.outputs.gate_pass != 'true'
        run: |
          echo "::warning::Quality-loop apply skipped: evaluation gate did not pass."
          echo "See eval_result.json artifact for details."

      - name: Write job summary
        if: always()
        run: |
          python - << 'PYEOF'
          import json, os
          lines = ['## MCTS Quality Loop Summary', '']
          try:
              d = json.load(open('eval_result.json'))
              gate = d.get('gate_pass', 'unknown')
              lines.append(f'**Gate pass:** {gate}')
              if 'median_improvement' in d:
                  lines.append(f"**Median improvement:** {d['median_improvement']:.4f}")
              if 'positive_rate' in d:
                  lines.append(f"**Positive rate:** {d['positive_rate']:.2%}")
          except Exception as e:
              lines.append(f'Could not parse eval_result.json: {e}')
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if summary_path:
              with open(summary_path, 'a', encoding='utf-8') as fh:
                  fh.write('\n'.join(lines) + '\n')
          PYEOF
