name: Issue Claim Assist

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

concurrency:
  group: "issue-claim-${{ github.event.issue.number }}"
  cancel-in-progress: false

jobs:
  claim:
    if: ${{ github.event.issue.pull_request == null }}
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - name: Reserve eligible issues for first claimant
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const body = (comment.body || "").trim();
            const bodyLower = body.toLowerCase();
            const author = comment.user?.login;

            if (!author || issue.state !== "open" || comment.user?.type === "Bot") {
              core.info("Ignoring closed issue, missing author, or bot comment.");
              return;
            }

            const issueLabels = (issue.labels || []).map((label) =>
              typeof label === "string" ? label : label.name,
            );
            const managedLabels = new Set(["good first issue", "help wanted"]);
            if (!issueLabels.some((label) => managedLabels.has(label))) {
              core.info("Issue is not managed by claim automation.");
              return;
            }

            const claimMatchers = [
              /\bi want to work on this\b/i,
              /\bi would like to work on this\b/i,
              /\bi'd like to work on this\b/i,
              /\bcan i work on this\b/i,
              /\bcan i take this\b/i,
              /\bi want to take this\b/i,
              /\bi'd like to take this\b/i,
              /\bplease assign(?: this)?(?: issue)? to me\b/i,
              /\bcould you please assign(?: this)?(?: issue)? to me\b/i,
            ];
            const hasClaimIntent = claimMatchers.some((matcher) => matcher.test(bodyLower));
            if (!hasClaimIntent) {
              core.info("No claim intent detected.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const claimMarkerPrefix = "<!-- drift-claim:";

            const ensureClaimedLabel = async () => {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: "claimed" });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: "claimed",
                  color: "0E8A16",
                  description: "Issue is reserved for one confirmed contributor",
                });
              }
            };

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existingClaimComment = comments.find((existing) =>
              existing.user?.type === "Bot" && existing.body?.includes(claimMarkerPrefix),
            );
            const existingClaimMatch = existingClaimComment?.body?.match(/<!-- drift-claim:([^ ]+) -->/i);
            const existingClaimant = existingClaimMatch?.[1] || null;

            if (existingClaimant && existingClaimant.toLowerCase() === author.toLowerCase()) {
              core.info("Claim already recorded for this contributor.");
              return;
            }

            if (existingClaimant || issueLabels.includes("claimed")) {
              const alreadyReplied = comments.some(
                (existing) =>
                  existing.user?.type === "Bot" &&
                  existing.body?.includes(`<!-- drift-claim-redirect:${author} -->`),
              );
              if (alreadyReplied) {
                core.info("Redirect comment already posted for this contributor.");
                return;
              }

              const reservedFor = existingClaimant ? `@${existingClaimant}` : "another contributor";
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: [
                  `<!-- drift-claim-redirect:${author} -->`,
                  `Thanks for offering to work on this, @${author}. This issue is already reserved for ${reservedFor}.`,
                  "",
                  "To avoid duplicate work, please pick another open `good first issue` or `help wanted` issue and I will be happy to help coordinate.",
                ].join("\n"),
              });
              return;
            }

            await ensureClaimedLabel();
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ["claimed"],
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: [
                `<!-- drift-claim:${author} -->`,
                `Thanks for volunteering to work on this, @${author}. I am reserving this issue for you now.`,
                "",
                "Please post a short progress update within 72 hours, or open a draft PR early, so coordination stays clear for everyone. If the issue goes inactive for a few days, it may be reopened for other contributors to keep momentum.",
              ].join("\n"),
            });