name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: "welcome-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}"
  cancel-in-progress: true

jobs:
  welcome:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue! 👋

            We'll get back to you within 72 hours. In the meantime:
            - Check [SUPPORT.md](https://github.com/mick-gsk/drift/blob/main/SUPPORT.md) for the right channel
            - Search existing [issues](https://github.com/mick-gsk/drift/issues) and [discussions](https://github.com/mick-gsk/drift/discussions)

            If this is a false-positive report, please include the drift version, signal name, and a minimal code example.
          pr-message: |
            Thanks for your first pull request! 👋

            A maintainer will review this within a few days. Please make sure:
            - [ ] `make check` passes locally (lint + types + tests + self-analysis)
            - [ ] The PR template is filled out
            - [ ] Tests are included for new behavior

            See [CONTRIBUTING.md](https://github.com/mick-gsk/drift/blob/main/CONTRIBUTING.md) for the full checklist.
