# PR Triage — auto-label and size-tag incoming pull requests.
# Reduces manual triage effort for maintainers.

name: PR Triage

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Auto-label by path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: false

  size:
    name: Size label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calculate diff size and apply label
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const changed = files.reduce((sum, f) => sum + f.additions + f.deletions, 0);

            let label;
            if (changed < 50) label = 'size: small';
            else if (changed <= 200) label = 'size: medium';
            else label = 'size: large';

            // Remove any existing size labels first
            const existing = (await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })).data.map(l => l.name).filter(n => n.startsWith('size: '));

            for (const old of existing) {
              if (old !== label) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: old,
                });
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label],
            });

            console.log(`Applied label: ${label} (${changed} lines changed)`);
