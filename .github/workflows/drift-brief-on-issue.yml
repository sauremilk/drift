# drift-brief-on-issue.yml
#
# Purpose:  Run `drift brief` before any code changes are made, and post
#           the result as the first comment on the issue.  This fills the
#           gap left by the action.yml `brief: true` option which only runs
#           after a push.  The GitHub issue event is the only layer that can
#           trigger a pre-coding briefing automatically.
#
# Trigger:  issues › opened  — if the issue already carries the agent-task label
#           issues › labeled — when the agent-task label is added to an issue
#
# Deps:     drift brief --task "..." --format markdown
#
# Security: The task string is passed via environment variable to avoid
#           shell-injection from issue title/body content.

name: Drift — Brief on Issue

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: read

concurrency:
  group: "drift-brief-${{ github.event.issue.number }}"
  cancel-in-progress: true

jobs:
  brief:
    name: Post drift brief as issue comment
    # Run when the agent-task label is applied, or when the issue is opened
    # and already carries the agent-task label (e.g. created via API with labels).
    if: >
      (github.event.action == 'labeled' && github.event.label.name == 'agent-task') ||
      (github.event.action == 'opened' &&
       contains(github.event.issue.labels.*.name, 'agent-task'))
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout default branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install drift-analyzer
        run: pip install --quiet drift-analyzer

      # Compose a task string from the issue title and the first 500 chars of
      # the issue body.  Passed as an env var to avoid shell-injection.
      - name: Build task string
        id: build-task
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const title = context.payload.issue.title || '';
            const body  = (context.payload.issue.body  || '').substring(0, 500);
            const task  = body.length > 0 ? `${title}: ${body}` : title;
            core.setOutput('task', task);
            core.info(`Task string (${task.length} chars): ${task.substring(0, 120)}...`);

      # Run drift brief.  continue-on-error: true because a failed briefing
      # must not block agent workflows — it posts a graceful error comment instead.
      - name: Run drift brief
        id: run-brief
        continue-on-error: true  # A failing brief is informational, not a gate
        env:
          DRIFT_TASK: ${{ steps.build-task.outputs.task }}
        run: |
          BRIEF_MD=$(drift brief --repo . --task "${DRIFT_TASK}" --format markdown 2>&1)
          BRIEF_EXIT=$?

          # Write to a temp file to avoid multiline output issues with GITHUB_OUTPUT
          BRIEF_FILE="${RUNNER_TEMP}/drift_brief_output.md"
          printf '%s' "${BRIEF_MD}" > "${BRIEF_FILE}"

          echo "brief-exit=${BRIEF_EXIT}" >> "${GITHUB_OUTPUT}"
          echo "brief-file=${BRIEF_FILE}"  >> "${GITHUB_OUTPUT}"

      # Post (or update) the brief as an issue comment.
      # The HTML marker <!-- drift-brief --> prevents duplicate comments.
      - name: Post brief comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        env:
          BRIEF_EXIT: ${{ steps.run-brief.outputs.brief-exit }}
          BRIEF_FILE: ${{ steps.run-brief.outputs.brief-file }}
        with:
          script: |
            const fs       = require('fs');
            const marker   = '<!-- drift-brief -->';
            const issueNum = context.payload.issue.number;

            const briefExit = parseInt(process.env.BRIEF_EXIT || '1', 10);
            let briefContent;

            if (briefExit === 0 && process.env.BRIEF_FILE) {
              try {
                briefContent = fs.readFileSync(process.env.BRIEF_FILE, 'utf8').trim();
              } catch (e) {
                briefContent = null;
              }
            }

            let body;
            if (briefContent) {
              body = [
                marker,
                `## 🧭 Drift Brief`,
                ``,
                briefContent,
                ``,
                `<sub>Automatisch generiert von drift-brief-on-issue · Ausführen vor der ersten Codeänderung</sub>`,
              ].join('\n');
            } else {
              body = [
                marker,
                `## 🧭 Drift Brief`,
                ``,
                `⚠️ \`drift brief\` could not generate a briefing for this issue.`,
                `This is informational — the issue is not blocked.`,
                `You can run \`drift brief --task "<task>" --format markdown\` locally`,
                `to get the structural constraints before starting work.`,
                ``,
                `<sub>Posted by drift-brief-on-issue</sub>`,
              ].join('\n');
            }

            // Find an existing drift-brief comment and update it, or create a new one.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNum,
              per_page: 100,
            });

            const existing = comments.find(c => (c.body || '').includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing drift-brief comment (id: ${existing.id}).`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNum,
                body,
              });
              core.info('Created new drift-brief comment.');
            }
