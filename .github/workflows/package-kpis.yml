name: Package KPIs

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      package:
        description: "PyPI package name"
        required: false
        default: "drift-analyzer"
      usage_csv_path:
        description: "Optional usage CSV path in repo (timestamp,project_id,version)"
        required: false
        default: ""
      defects_csv_path:
        description: "Optional defects CSV path in repo"
        required: false
        default: ""

concurrency:
  group: "package-kpis"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  collect-kpis:
    # NOTE: Uses GitHub-hosted Windows runner.
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: ./.github/actions/python-setup
        with:
          python-version: "3.11"

      - name: Fetch monthly PyPI downloads
        shell: bash
        run: |
          python scripts/fetch_pypistats.py \
            --package "${{ github.event.inputs.package || 'drift-analyzer' }}" \
            --months 24 \
            --output benchmark_results/package_kpis/pypi_downloads_monthly.csv

      - name: Derive usage from public GitHub dependency declarations
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/fetch_github_usage.py \
            --package "${{ github.event.inputs.package || 'drift-analyzer' }}" \
            --token "$GH_TOKEN" \
            --max-pages 5 \
            --output benchmark_results/package_kpis/github_usage_events.csv

      - name: Build KPI report (if usage data is available)
        shell: bash
        env:
          USAGE_CSV_PATH: ${{ github.event.inputs.usage_csv_path }}
          DEFECTS_CSV_PATH: ${{ github.event.inputs.defects_csv_path }}
        run: |
          EFFECTIVE_USAGE="$USAGE_CSV_PATH"
          if [ -z "$EFFECTIVE_USAGE" ]; then
            EFFECTIVE_USAGE="benchmark_results/package_kpis/github_usage_events.csv"
          fi

          if [ -n "$EFFECTIVE_USAGE" ] && [ -f "$EFFECTIVE_USAGE" ]; then
            DEFECTS_ARG=""
            if [ -n "$DEFECTS_CSV_PATH" ] && [ -f "$DEFECTS_CSV_PATH" ]; then
              DEFECTS_ARG="--defects-csv $DEFECTS_CSV_PATH"
            fi
            python scripts/package_kpis.py \
              --package "${{ github.event.inputs.package || 'drift-analyzer' }}" \
              --usage-csv "$EFFECTIVE_USAGE" \
              $DEFECTS_ARG \
              --downloads-csv benchmark_results/package_kpis/pypi_downloads_monthly.csv \
              --thresholds-json examples/package-kpis/kpi-thresholds.json \
              --months 24 \
              --output benchmark_results/package_kpis/package_kpis_real.json
          else
            echo "Skipping KPI build: no usage source file found."
          fi

      - name: Upload KPI artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: package-kpis
          path: |
            benchmark_results/package_kpis/github_usage_events.csv
            benchmark_results/package_kpis/pypi_downloads_monthly.csv
            benchmark_results/package_kpis/package_kpis_real.json
          if-no-files-found: warn
