name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  version-check:
    name: Version format check
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Ensure Python is available on self-hosted runner
        shell: powershell
        run: |
          $resolved = $false
          if (Get-Command python -ErrorAction SilentlyContinue) {
            python --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=python" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved -and (Get-Command py -ErrorAction SilentlyContinue)) {
            py --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=py" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved) {
            Write-Error "Neither 'python' nor 'py' is available on this self-hosted runner."
            exit 1
          }

      - name: Validate pyproject.toml version is SemVer
        shell: powershell
        run: |
          & $env:PYTHON_BIN scripts/check_version.py --check-semver

      - name: Enforce release discipline
        shell: powershell
        run: |
          & $env:PYTHON_BIN scripts/check_release_discipline.py

      - name: Check model consistency
        shell: powershell
        run: |
          & $env:PYTHON_BIN scripts/check_model_consistency.py

  test:
    runs-on: self-hosted
    needs: version-check
    strategy:
      matrix:
        python-version: ["3.12"]
    name: Test (Python ${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure Python is available on self-hosted runner
        shell: powershell
        run: |
          $resolved = $false
          if (Get-Command python -ErrorAction SilentlyContinue) {
            python --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=python" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved -and (Get-Command py -ErrorAction SilentlyContinue)) {
            py --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=py" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved) {
            Write-Error "Neither 'python' nor 'py' is available on this self-hosted runner."
            exit 1
          }

      - name: Install dependencies
        shell: powershell
        run: |
          & $env:PYTHON_BIN -m pip install -e ".[dev]"

      - name: Lint with ruff
        shell: powershell
        run: |
          & $env:PYTHON_BIN -m ruff check src/ tests/

      - name: Type-check with mypy
        shell: powershell
        run: |
          & $env:PYTHON_BIN -m mypy src/drift

      - name: Run tests with coverage
        shell: powershell
        run: |
          & $env:PYTHON_BIN -m pytest -v --tb=short --cov=drift --cov-report=xml --cov-report=term-missing -m "not slow"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Self-analysis
        shell: powershell
        run: |
          & $env:PYTHON_BIN -m drift analyze --repo . --format json | Out-Null

      - name: Drift self-check (score gate)
        shell: powershell
        run: |
          & $env:PYTHON_BIN -m drift self --format json | Set-Content drift_score.json
          & $env:PYTHON_BIN -c @'
          import json, sys
          data = json.load(open('drift_score.json'))
          score = data['drift_score']
          if score > 0.47:
              print(f'FAIL: drift self score {score:.3f} exceeds threshold 0.47')
              sys.exit(1)
          print(f'OK: drift self score {score:.3f} (threshold 0.47)')
          '@
