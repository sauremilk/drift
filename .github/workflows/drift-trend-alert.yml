name: Drift Trend Alert

# Weekly check: if the composite drift score deteriorates by more than
# the configured delta threshold, open a GitHub issue for triage.

on:
  schedule:
    # Weekly Monday 05:00 UTC
    - cron: "0 5 * * 1"
  workflow_dispatch:
    inputs:
      delta_threshold:
        description: "Maximum allowed score increase (worse = higher) vs. baseline"
        required: false
        default: "5"
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: "drift-trend-alert"
  cancel-in-progress: true

jobs:
  trend-alert:
    name: Drift score trend check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/python-setup
        with:
          python-version: "3.12"

      - name: Run drift self-analysis
        run: |
          drift self --format json > drift_score_current.json

      - name: Check trend and alert
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DELTA_THRESHOLD: ${{ inputs.delta_threshold || '5' }}
        run: python scripts/ci_drift_trend_alert.py
