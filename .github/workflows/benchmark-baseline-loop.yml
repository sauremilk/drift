name: Benchmark Baseline Loop

# Two automatic triggers:
#   A) After a successful release → fast KPI snapshot (drift analyze only)
#   B) Weekly Sunday → full mutation benchmark + regression comparison + issue-on-regression
#
# Commits updated perf_baseline_latest.json back to main with [skip ci].
# Never modifies ci.yml / release.yml / fp-oracle-audit.yml.

on:
  workflow_run:
    workflows: ["Release (python-semantic-release)"]
    types: [completed]
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"   # Sunday 02:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "quick (drift analyze only) or full (+ mutation benchmark)"
        required: false
        default: "quick"
        type: choice
        options: [quick, full]

concurrency:
  group: benchmark-baseline-loop
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  # ── Job A: KPI snapshot (fast, runs after every release or on workflow_dispatch quick) ──────────
  kpi-snapshot:
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'quick')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]" --quiet

      - name: Create benchmark_results directory
        run: mkdir -p benchmark_results

      - name: Restore previous KPI baseline
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: benchmark_results/perf_baseline_latest.json
          key: kpi-baseline-${{ github.run_id }}
          restore-keys: kpi-baseline-
        continue-on-error: true

      - name: Generate KPI snapshot (drift analyze only)
        run: |
          python scripts/generate_benchmark_baseline.py --skip-drift-analyze
        # Note: mutation_benchmark.json is no longer committed to git; only drift_score refresh needs re-analyze.
        # We run without --skip-drift-analyze only in the full job to keep this step fast.

      - name: Generate KPI snapshot with drift analyze
        run: python scripts/generate_benchmark_baseline.py
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Upload updated KPI baseline
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: perf-baseline
          path: benchmark_results/perf_baseline_latest.json
          retention-days: 90

      - name: Save KPI baseline to cache
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: benchmark_results/perf_baseline_latest.json
          key: kpi-baseline-${{ github.run_id }}

  # ── Job B: Full mutation benchmark + regression gate (weekly or manual full) ─────────────────
  mutation-baseline:
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'full')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]" --quiet

      - name: Create benchmark_results directory
        run: mkdir -p benchmark_results

      - name: Restore previous mutation baseline
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            benchmark_results/perf_baseline_latest.json
            benchmark_results/mutation_benchmark.json
          key: kpi-baseline-${{ github.run_id }}
          restore-keys: kpi-baseline-
        continue-on-error: true

      - name: Run mutation benchmark
        run: python scripts/mutation_benchmark.py

      - name: Generate baseline + compare against previous
        id: compare
        run: |
          python scripts/generate_benchmark_baseline.py \
            --compare-previous \
            --gh-issue-on-regression
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        continue-on-error: true

      - name: Record regression outcome
        id: regression
        if: steps.compare.outcome == 'failure'
        run: echo "detected=true" >> "$GITHUB_OUTPUT"

      - name: Upload updated mutation baseline
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: mutation-baseline
          path: |
            benchmark_results/perf_baseline_latest.json
            benchmark_results/mutation_benchmark.json
          retention-days: 90

      - name: Save mutation baseline to cache
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            benchmark_results/perf_baseline_latest.json
            benchmark_results/mutation_benchmark.json
          key: kpi-baseline-${{ github.run_id }}

      - name: Fail workflow on regression (after uploading baseline)
        if: steps.regression.outputs.detected == 'true'
        run: |
          echo "::error::Benchmark regression detected -- see opened GitHub issue."
          exit 1
