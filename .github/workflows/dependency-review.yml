name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: "dep-review-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Review dependency changes
    if: ${{ github.actor != 'dependabot[bot]' }}
    # NOTE: Uses self-hosted Windows runner until the GitHub-hosted billing lock is resolved.
    # Migration back to GitHub-hosted runners remains tracked in issue #90.
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
