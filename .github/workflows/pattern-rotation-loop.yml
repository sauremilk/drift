name: Pattern Rotation Loop

# After each FP Oracle Audit: auto-generate negative-pattern stubs for
# signals exceeding the FP rate threshold.  Opens a PR with auto-merge.
#
# Never modifies fp-oracle-audit.yml, ci.yml, or release.yml.

on:
  workflow_run:
    workflows: ["FP Oracle Audit"]
    types: [completed]
  schedule:
    - cron: "30 4 * * 1"   # Monday 04:30 UTC (weekly fallback)
  workflow_dispatch:

concurrency:
  group: pattern-rotation-loop
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    # Run after a successful oracle audit, or on schedule/manual
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]" --quiet

      # Download the oracle report artifact from the triggering workflow run
      - name: Download fp-oracle-report artifact (workflow_run)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: fp-oracle-report
          path: /tmp/fp-oracle-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # Use committed oracle report when artifact is unavailable (schedule/dispatch)
      - name: Locate oracle report
        id: locate
        run: |
          if [ -f /tmp/fp-oracle-report/oracle_fp_report.json ]; then
            echo "report=/tmp/fp-oracle-report/oracle_fp_report.json" >> "$GITHUB_OUTPUT"
          elif [ -f benchmark_results/oracle_fp_report.json ]; then
            echo "report=benchmark_results/oracle_fp_report.json" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No oracle_fp_report.json found — skipping rotation."
            echo "report=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pattern rotation (dry-run check)
        if: steps.locate.outputs.report != ''
        run: |
          python scripts/pattern_rotation.py \
            --report "${{ steps.locate.outputs.report }}" \
            --dry-run

      - name: Run pattern rotation
        id: rotate
        if: steps.locate.outputs.report != ''
        run: |
          python scripts/pattern_rotation.py \
            --report "${{ steps.locate.outputs.report }}"
          # Count new stubs
          COUNT=$(git status --short data/negative-patterns/patterns/ | grep -c "^??")
          echo "new_stubs=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Validate pattern schema
        if: steps.rotate.outputs.new_stubs != '0' && steps.rotate.outputs.new_stubs != ''
        run: python scripts/validate_negative_patterns.py

      - name: Open PR with new pattern stubs
        if: steps.rotate.outputs.new_stubs != '0' && steps.rotate.outputs.new_stubs != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="patterns/auto-rotate-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/negative-patterns/patterns/
          git commit -m "chore(patterns): auto-rotate ${{ steps.rotate.outputs.new_stubs }} FP pattern stub(s) from oracle audit [skip ci]"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore(patterns): auto-rotate ${{ steps.rotate.outputs.new_stubs }} FP pattern stub(s)" \
            --body "$(cat <<'BODY'
          Auto-generated by **pattern-rotation-loop.yml** after FP Oracle Audit.

          ### What changed
          New negative-pattern stubs were created for signals exceeding the FP rate threshold (15%).
          Each stub has `tp_confirmed: false` — it is a tracking artifact, not a live test case.

          ### Next step for maintainer
          For each new stub, extract a minimal reproducer from the oracle repository and set
          `tp_confirmed: true` once verified.  Until then the stub is inert (skipped by
          `check_negative_patterns.py`).
          BODY
          )" \
            --label "patterns,automated-pr" \
            --head "$BRANCH" \
            --base main

          # Auto-merge after CI: schema check already passed above
          PR_NUM=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          gh pr merge "$PR_NUM" --auto --squash --delete-branch
