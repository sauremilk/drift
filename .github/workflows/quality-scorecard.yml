name: ISO Quality Scorecard

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: "quality-scorecard"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate:
    name: Generate ISO/IEC 25010 scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: ./.github/actions/python-setup
        with:
          python-version: "3.12"

      - name: Build scorecard
        run: |
          python scripts/quality_scorecard.py --apply

      - name: Write step summary
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("benchmark_results/quality_scorecard.json")
          if not path.exists():
              raise SystemExit("quality_scorecard.json missing")

          data = json.loads(path.read_text(encoding="utf-8"))
          lines = [
              "## ISO/IEC 25010 Scorecard",
              "",
              f"- Overall score: **{data.get('overall_score', 0):.4f}**",
              f"- Coverage ratio: **{data.get('coverage_ratio', 0):.4f}**",
              "",
              "| Dimension | Score | Confidence |",
              "|-----------|-------|------------|",
          ]
          for name, entry in data.get("dimensions", {}).items():
              lines.append(
                  f"| `{name}` | {float(entry.get('score', 0)):.4f} | {entry.get('confidence', 'n/a')} |"
              )

            step_summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
            step_summary.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload scorecard artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: iso-quality-scorecard-${{ github.run_id }}
          path: benchmark_results/quality_scorecard.json
          if-no-files-found: error
          retention-days: 90