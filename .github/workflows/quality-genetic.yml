name: "Quality Loop - Hybrid GA (weekly)"

on:
  schedule:
    # 02:00 UTC every Sunday
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      ga_generations:
        description: "Number of GA generations"
        required: false
        default: "20"
      ga_population:
        description: "GA population size"
        required: false
        default: "10"
      mcts_budget:
        description: "MCTS seed budget"
        required: false
        default: "50"
      dry_run:
        description: "Dry-run (no commits)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  hybrid-quality-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (dev + autopatch)
        run: pip install -e '.[dev,autopatch]'

      - name: Run hybrid GA quality loop
        id: ga_run
        run: |
          python -m scripts.quality_loop run \
            --mode hybrid \
            --src src/drift \
            --mcts-budget ${{ github.event.inputs.mcts_budget || '50' }} \
            --ga-generations ${{ github.event.inputs.ga_generations || '20' }} \
            --ga-population ${{ github.event.inputs.ga_population || '10' }} \
            --min-improvement 0.01 \
            ${{ (github.event.inputs.dry_run == 'true') && '--dry-run' || '' }} \
            --output-json ga_result.json \
            --exit-zero
        continue-on-error: true

      - name: Upload GA result artifact
        uses: actions/upload-artifact@v4
        with:
          name: ga_result
          path: ga_result.json
          retention-days: 90

      - name: Multi-seed evaluation (gate check)
        id: evaluate
        run: |
          python -m scripts.quality_loop evaluate \
            --src src/drift \
            --mode hybrid \
            --mcts-budget 10 \
            --ga-generations 5 \
            --ga-population 5 \
            --seeds 11,22,33,44,55 \
            --min-improvement 0.01 \
            --min-median 0.01 \
            --min-positive-rate 0.70 \
            --drift-tolerance 0.005 \
            --output-json eval_result.json \
            --exit-zero
          python -c "import json,os; d=json.load(open('eval_result.json')); open(os.environ['GITHUB_OUTPUT'],'a').write('gate_pass='+str(d['gate_pass']).lower()+'\n')"
        continue-on-error: true

      - name: Upload evaluation result artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval_result_ga
          path: eval_result.json
          retention-days: 90

      - name: Commit improvements (if any)
        if: |
          github.event.inputs.dry_run != 'true' &&
          steps.evaluate.outputs.gate_pass == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add -A src/drift/
            git commit -m "chore: GA quality loop improvement [skip ci]"
            git push
          fi

      - name: Report gate block (no apply)
        if: |
          github.event.inputs.dry_run != 'true' &&
          steps.evaluate.outputs.gate_pass != 'true'
        run: |
          echo "::warning::Quality-loop apply skipped: evaluation gate did not pass."
          echo "See eval_result.json artifact for details."

            git commit -m "chore: GA quality loop improvement [skip ci]"
            git push
          fi
