name: Validate Release Tag

# Triggered on every tag push matching v*.
# Acts as the first gate in the release pipeline:
#   - Rejects tags that are not full SemVer (vMAJOR.MINOR.PATCH)
#   - Rejects major-only tags pushed by humans (v1, v2 → automation only)
#   - Rejects mismatches between the tag and pyproject.toml version
#   - Creates a published GitHub release from the validated tag
#     to trigger publish.yml automatically
#
# For extra safety, publish.yml runs the same check as its first job.

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

concurrency:
  group: "validate-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  validate-tag:
    name: Validate tag & pyproject.toml consistency
    # NOTE: Uses GitHub-hosted Windows runner.
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Python executable
        shell: powershell
        run: |
          $resolved = $false
          if (Get-Command python -ErrorAction SilentlyContinue) {
            python --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=python" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved -and (Get-Command py -ErrorAction SilentlyContinue)) {
            py --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=py" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved) {
            Write-Error "Neither 'python' nor 'py' is available on this runner."
            exit 1
          }

      - name: Block major-only tags and validate SemVer format
        # Rejects v1, v2, etc. – those must only come from automation.
        # Accepts v1.2.3 style and validates pyproject.toml matches.
        shell: powershell
        run: |
          & $env:PYTHON_BIN scripts/check_version.py --tag "${{ github.ref_name }}"

  create-release:
    name: Create GitHub release from validated tag
    needs: validate-tag
    # NOTE: Uses GitHub-hosted Windows runner.
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Create published release if missing
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$env:TAG" --repo "$env:GITHUB_REPOSITORY" *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Output "Release for $env:TAG already exists - skipping creation"
            exit 0
          }

          # Validation-created releases can be for historical tags and must not steal Latest.
          gh release create "$env:TAG" --repo "$env:GITHUB_REPOSITORY" --title "$env:TAG" --generate-notes --latest=false
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to create release for $env:TAG"
            exit 1
          }
          Write-Output "Created published release for $env:TAG"
