name: Install Smoke Test

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to test (e.g. 1.2.0). Leave empty for latest."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: "smoke-${{ github.event.release.tag_name || github.run_id }}"
  cancel-in-progress: true

jobs:
  smoke:
    name: Install from PyPI and verify CLI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Wait for PyPI propagation
        if: github.event_name == 'release'
        run: sleep 60

      - name: Install drift-analyzer from PyPI
        run: |
          VERSION="${{ inputs.version || '' }}"
          if [ -n "$VERSION" ]; then
            pip install "drift-analyzer==$VERSION"
          else
            pip install drift-analyzer
          fi

      - name: Verify CLI entry point
        run: drift --version

      - name: Verify drift --help
        run: drift --help

      - name: Verify drift analyze (dry run on empty dir)
        run: |
          mkdir /tmp/test-repo && cd /tmp/test-repo && git init
          drift analyze . --format json 2>&1 || true

      - name: Verify importability
        run: python -c "import drift; print(drift.__version__)"
