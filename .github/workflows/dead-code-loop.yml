name: Dead Code Elimination Loop

# Weekly: run vulture, collect new findings, update pyproject.toml ignore_names
# and vulture_whitelist.py, then open a PR.  Auto-merge after CI green.
#
# Never modifies ci.yml.

on:
  schedule:
    - cron: "0 3 * * 2"   # Tuesday 03:00 UTC
  workflow_dispatch:

concurrency:
  group: dead-code-loop
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  dead-code:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 1

      - uses: ./.github/actions/python-setup
        with:
          python-version: "3.12"

      - name: Run vulture at confidence 65 (matches CI threshold)
        id: vulture
        run: |
          python -m vulture src/drift --min-confidence 65 2>&1 | tee vulture_output.txt || true
          COUNT=$(grep -c "unused " vulture_output.txt 2>/dev/null || echo 0)
          echo "findings=$COUNT" >> $GITHUB_OUTPUT

      - name: Update whitelist for new findings
        id: whitelist
        run: |
          python scripts/dead_code_pr.py vulture_output.txt
          # Check if anything changed
          if git diff --quiet pyproject.toml vulture_whitelist.py 2>/dev/null; then
            echo "new_entries=0" >> $GITHUB_OUTPUT
          else
            ADDED=$(git diff pyproject.toml | grep '^+.*"[^"]*"' | grep -v '^+++' | wc -l | tr -d ' ')
            echo "new_entries=$ADDED" >> $GITHUB_OUTPUT
          fi

      - name: Open PR with whitelist updates
        if: steps.whitelist.outputs.new_entries != '0'
        run: |
          BRANCH="dead-code/auto-whitelist-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add pyproject.toml vulture_whitelist.py
          git commit -m "chore(vulture): whitelist ${{ steps.whitelist.outputs.new_entries }} dead-code finding(s) [skip ci]"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore(vulture): auto-whitelist dead-code findings (${{ steps.whitelist.outputs.new_entries }} new)" \
            --body "$(cat <<'BODY'
          Auto-generated by **dead-code-loop.yml** (weekly Tuesday 03:00 UTC).

          ### What changed
          New symbols flagged by vulture at confidence ≥ 65% have been added to
          `pyproject.toml [tool.vulture] ignore_names` and annotated in `vulture_whitelist.py`.

          Vulture findings processed: **${{ steps.vulture.outputs.findings }}**
          New entries added: **${{ steps.whitelist.outputs.new_entries }}**

          ### Review guidance
          Please verify each added symbol is genuinely dynamic (e.g. Click callback,
          Pydantic field, plugin hook).  If a symbol IS dead code, remove it from the PR
          and delete it from source instead.
          BODY
          )" \
            --label "chore,automated-pr" \
            --head "$BRANCH" \
            --base main

          PR_NUM=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          gh pr merge "$PR_NUM" --auto --squash --delete-branch

      - name: No new dead code
        if: steps.whitelist.outputs.new_entries == '0'
        run: echo "No new vulture findings — nothing to do."
