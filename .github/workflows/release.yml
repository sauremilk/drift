name: Release (python-semantic-release)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    # NOTE: Uses GitHub-hosted Windows runner.
    runs-on: windows-latest
    timeout-minutes: 15
    # Skip release-commit pushes (safety net; GITHUB_TOKEN pushes
    # already don't trigger workflows, but guard explicitly).
    if: "!startsWith(github.event.head_commit.message, 'chore: Release ')"

    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python-semantic-release
        shell: powershell
        run: pip install python-semantic-release

      - name: Python Semantic Release – Version
        id: release
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUTF8: "1"
        run: |
          # Run version detection and local commit+tag (no push yet)
          semantic-release -v version --no-push --no-vcs-release --skip-build

          # Check if a new tag was created on HEAD.
          # `git tag --points-at` is stable in PowerShell even when no tag exists.
          $tag = (git tag --points-at HEAD | Select-Object -First 1)
          if ([string]::IsNullOrWhiteSpace($tag)) {
            Write-Output "No new version - nothing to release."
            "released=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }

          $tag = $tag.Trim()
          $version = $tag -replace '^v', ''
          Write-Output "Detected release: tag=$tag version=$version"
          "released=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Update CITATION.cff version
        if: steps.release.outputs.released == 'true'
        shell: powershell
        run: |
          $version = "${{ steps.release.outputs.version }}"
          $date = Get-Date -Format "yyyy-MM-dd"
          $content = Get-Content CITATION.cff -Raw
          $content = $content -replace 'version: "[^"]*"', "version: `"$version`""
          $content = $content -replace 'date-released: "[^"]*"', "date-released: `"$date`""
          Set-Content CITATION.cff $content -NoNewline
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff
          git commit --amend --no-edit
          # Re-tag to amended commit (amend changed the hash,
          # but the tag still pointed to the pre-amend orphan).
          $tag = "${{ steps.release.outputs.tag }}"
          git tag -f $tag

      - name: Push release commit and tag
        if: steps.release.outputs.released == 'true'
        shell: powershell
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            # Push branch and force-push the tag separately.
            # --tags does NOT force-update existing remote tags;
            # the explicit -f ensures the re-tagged (post-amend) ref
            # always overwrites any stale remote tag.
            git push origin main
            if ($LASTEXITCODE -ne 0) {
              if ($i -lt $maxRetries) {
                Write-Warning "branch push failed (attempt $i/$maxRetries), retrying in $($i * 10)s..."
                Start-Sleep -Seconds ($i * 10)
                continue
              }
              Write-Error "branch push failed after $maxRetries attempts"
              exit 1
            }
            git push origin "$tag" -f
            if ($LASTEXITCODE -eq 0) { break }
            if ($i -lt $maxRetries) {
              Write-Warning "tag push failed (attempt $i/$maxRetries), retrying in $($i * 10)s..."
              Start-Sleep -Seconds ($i * 10)
            } else {
              Write-Error "tag push failed after $maxRetries attempts"
              exit 1
            }
          }

      - name: Create GitHub Release from CHANGELOG
        if: steps.release.outputs.released == 'true'
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUTF8: "1"
        run: |
          $version = "${{ steps.release.outputs.version }}"
          $tag = "${{ steps.release.outputs.tag }}"

          # Extract the release section from CHANGELOG.md
          $notes = python -c @"
          import re, sys
          content = open('CHANGELOG.md', encoding='utf-8').read()
          heading_re = re.compile(r'^## \[(\d+\.\d+\.\d+)\]', re.MULTILINE)
          matches = list(heading_re.finditer(content))
          for i, m in enumerate(matches):
              if m.group(1) == '$version':
                  rest = content[m.end():]
                  start = m.end() + rest.index('\n') + 1 if '\n' in rest else m.end()
                  end = matches[i+1].start() if i+1 < len(matches) else len(content)
                  print(content[start:end].strip())
                  sys.exit(0)
          print('See [CHANGELOG.md](https://github.com/mick-gsk/drift/blob/main/CHANGELOG.md) for details.')
          "@

          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = "See [CHANGELOG.md](https://github.com/mick-gsk/drift/blob/main/CHANGELOG.md) for details."
          }

          # Write notes to temp file to avoid shell escaping issues
          $notesFile = [System.IO.Path]::GetTempFileName()
          Set-Content -Path $notesFile -Value $notes -Encoding utf8

          gh release create $tag --title $tag --notes-file $notesFile --repo $env:GITHUB_REPOSITORY
          Remove-Item $notesFile -ErrorAction SilentlyContinue
          Write-Output "Created GitHub Release: $tag"

  publish:
    name: Build and publish to PyPI
    needs: release
    if: needs.release.outputs.released == 'true'
    # NOTE: Uses GitHub-hosted Windows runner.
    runs-on: windows-latest
    timeout-minutes: 15
    environment: pypi

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        shell: powershell
        run: |
          pip install --upgrade build twine
          python -m build

      - name: Publish to PyPI
        shell: powershell
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_RELEASE }}
        run: python -m twine upload --non-interactive dist/*

  update-major-tag:
    name: Update major-version tag (e.g. v1 → latest patch)
    needs: [release, publish]
    if: needs.release.outputs.released == 'true'
    # NOTE: Uses GitHub-hosted Windows runner.
    runs-on: windows-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Move major-version tag
        shell: powershell
        run: |
          $tag = "${{ needs.release.outputs.tag }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Output "Tag $tag does not match vMAJOR.MINOR.PATCH - skipping major-tag update"
            exit 0
          }
          $major = [regex]::Match($tag, '^v\d+').Value
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f $major
          git push -f origin $major
          Write-Output "Moved $major -> $tag"
