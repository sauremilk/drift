name: Auto Create Release On Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: auto-release-on-push
  cancel-in-progress: false

jobs:
  create-release-if-needed:
    name: Create tag + release when version is untagged
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure Python is available on self-hosted runner
        shell: powershell
        run: |
          $resolved = $false
          if (Get-Command python -ErrorAction SilentlyContinue) {
            python --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=python" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved -and (Get-Command py -ErrorAction SilentlyContinue)) {
            py --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=py" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved) {
            Write-Error "Neither 'python' nor 'py' is available on this self-hosted runner."
            exit 1
          }

      - name: Validate pyproject.toml SemVer format
        shell: powershell
        run: |
          & $env:PYTHON_BIN scripts/check_version.py --check-semver

      - name: Runner tooling health check
        shell: powershell
        run: |
          git --version
          gh --version

      - name: Resolve release tag from pyproject.toml
        id: version
        shell: powershell
        run: |
          $version = & $env:PYTHON_BIN -c "import tomllib; from pathlib import Path; data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8')); print(data['project']['version'])"
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Resolved release tag: v$version"

      - name: Check whether tag and release already exist
        id: check
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          $ErrorActionPreference = 'Continue'
          git ls-remote --exit-code --tags origin "refs/tags/$env:TAG" 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            "tag_exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "tag_exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
          gh release view "$env:TAG" *> $null
          if ($LASTEXITCODE -eq 0) {
            "release_exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "release_exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
          $global:LASTEXITCODE = 0

      - name: Create and push missing version tag
        if: steps.check.outputs.tag_exists != 'true'
        shell: powershell
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$env:TAG" "$env:GITHUB_SHA"
          git push origin "$env:TAG"
          Write-Host "Created missing tag $env:TAG"

      - name: Create missing GitHub release
        if: steps.check.outputs.release_exists != 'true'
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          $ErrorActionPreference = 'Continue'
          gh release view "$env:TAG" *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release for $env:TAG already exists - skipping"
            exit 0
          }
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            gh release create "$env:TAG" --title "$env:TAG" --generate-notes
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Created missing release for $env:TAG"
              exit 0
            }

            if ($attempt -lt $maxAttempts) {
              Write-Warning "Release create attempt $attempt failed - retrying in 5 seconds"
              Start-Sleep -Seconds 5
            }
          }

          Write-Error "Failed to create release for $env:TAG after $maxAttempts attempts"
          exit 1

      - name: Skip summary
        if: steps.check.outputs.tag_exists == 'true' && steps.check.outputs.release_exists == 'true'
        shell: powershell
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: Write-Host "Tag and release already exist for $env:TAG - nothing to do"
