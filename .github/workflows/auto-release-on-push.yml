name: Auto Create Release On Push

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: auto-release-on-push
  cancel-in-progress: false

jobs:
  create-release-if-needed:
    name: Create tag + release when version is untagged
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate pyproject.toml SemVer format
        run: python scripts/check_version.py --check-semver

      - name: Resolve release tag from pyproject.toml
        id: version
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: v$VERSION"

      - name: Check whether tag and release already exist
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push missing version tag
        if: steps.check.outputs.tag_exists != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" "${GITHUB_SHA}"
          git push origin "$TAG"
          echo "Created missing tag $TAG"

      - name: Create missing GitHub release
        if: steps.check.outputs.release_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release for $TAG already exists - skipping"
            exit 0
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
          echo "Created missing release for $TAG"

      - name: Skip summary
        if: steps.check.outputs.tag_exists == 'true' && steps.check.outputs.release_exists == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: echo "Tag and release already exist for $TAG - nothing to do"