name: FP Oracle Audit

on:
  schedule:
    # Weekly: Sunday 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated repo names (empty = all from manifest)'
        required: false
        default: ''
      save_history:
        description: 'Append results to trend log'
        required: false
        type: boolean
        default: true
      use_dev_version:
        description: 'Install dev version from workspace instead of published PyPI package'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  fp-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install drift
        shell: bash
        run: |
          pip install --upgrade pip
          if [ "${{ inputs.use_dev_version || 'false' }}" = "true" ]; then
            pip install -e ".[dev]"
          else
            pip install drift-analyzer
          fi

      - name: Create benchmark_results directory
        run: mkdir -p benchmark_results

      - name: Restore previous oracle report
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            benchmark_results/oracle_fp_report.json
            benchmark_results/oracle_fp_history.json
          key: fp-oracle-${{ github.run_id }}
          restore-keys: fp-oracle-
        continue-on-error: true

      - name: Run Oracle FP Audit
        run: |
          ARGS=()
          if [ -n "${{ inputs.repos }}" ]; then
            IFS=',' read -ra REPOS <<< "${{ inputs.repos }}"
            ARGS+=(--repo "${REPOS[@]}")
          fi
          if [ "${{ inputs.save_history }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS+=(--save-history)
          fi
          python scripts/oracle_fp_audit.py "${ARGS[@]}"

      - name: Upload FP Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: fp-oracle-report
          path: |
            benchmark_results/oracle_fp_report.json
            benchmark_results/oracle_fp_history.json
          retention-days: 90

      - name: Alert on high FP rate
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/ci_fp_threshold_alert.py

      - name: Save oracle report to cache
        if: always()
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            benchmark_results/oracle_fp_report.json
            benchmark_results/oracle_fp_history.json
          key: fp-oracle-${{ github.run_id }}
