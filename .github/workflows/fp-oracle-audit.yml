name: FP Oracle Audit

on:
  schedule:
    # Weekly: Sunday 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated repo names (empty = all from manifest)'
        required: false
        default: ''
      save_history:
        description: 'Append results to trend log'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  fp-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install drift
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Oracle FP Audit
        run: |
          ARGS=""
          if [ -n "${{ inputs.repos }}" ]; then
            IFS=',' read -ra REPOS <<< "${{ inputs.repos }}"
            ARGS="--repo ${REPOS[*]}"
          fi
          if [ "${{ inputs.save_history }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="$ARGS --save-history"
          fi
          python scripts/oracle_fp_audit.py $ARGS

      - name: Upload FP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fp-oracle-report
          path: |
            benchmark_results/oracle_fp_report.json
            benchmark_results/oracle_fp_history.json
          retention-days: 90
