name: Issue Claim Timeout

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  issues: write

concurrency:
  group: "issue-claim-timeout"
  cancel-in-progress: true

jobs:
  follow-up:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Remind inactive claim holders
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const now = Date.now();
            const cutoffMs = 72 * 60 * 60 * 1000;
            const reminderMarker = "<!-- drift-claim-timeout -->";

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "claimed",
              per_page: 100,
            });

            for (const issue of issues) {
              if (issue.pull_request) {
                continue;
              }

              const updatedAt = Date.parse(issue.updated_at);
              if (Number.isNaN(updatedAt) || now - updatedAt < cutoffMs) {
                continue;
              }

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issue.number,
                per_page: 100,
              });

              const alreadyReminded = comments.some(
                (comment) => comment.user?.type === "Bot" && comment.body?.includes(reminderMarker),
              );
              if (alreadyReminded) {
                continue;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: [
                  reminderMarker,
                  "Quick check-in on this issue. There has not been a recent progress update, so I want to confirm whether someone is still working on it.",
                  "",
                  "If you still plan to continue, please share a short update or open a draft PR in the next 24 hours. If not, no problem, the issue can be reopened for other contributors so work keeps moving.",
                ].join("\n"),
              });
            }