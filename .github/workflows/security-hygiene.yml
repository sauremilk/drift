name: Security Hygiene

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "sec-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  hygiene:
    name: Secret and workflow hygiene
    # NOTE: Uses GitHub-hosted Windows runner.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install pre-commit
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" pre-commit==4.2.0 pip-audit

      - name: Check committed private keys
        shell: powershell
        run: pre-commit run --all-files detect-private-key

      - name: Run secret scan baseline gate
        shell: powershell
        run: pre-commit run --all-files detect-secrets

      - name: Lint shell scripts
        continue-on-error: true
        shell: powershell
        run: pre-commit run --all-files shellcheck

      - name: Lint GitHub workflows
        shell: powershell
        run: pre-commit run --all-files actionlint

      - name: Audit GitHub workflows
        continue-on-error: true
        shell: powershell
        run: pre-commit run --all-files zizmor

      - name: Audit Python dependencies (pip-audit)
        continue-on-error: true
        shell: powershell
        run: |
          python -m pip_audit --strict --desc
