name: Security Hygiene

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "sec-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  hygiene:
    name: Secret and workflow hygiene (${{ matrix.os }})
    # NOTE: Runs on Ubuntu and Windows for cross-platform coverage.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install pre-commit
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" pre-commit==4.2.0 pip-audit

      - name: Check committed private keys
        shell: pwsh
        run: pre-commit run --all-files detect-private-key

      - name: Run secret scan baseline gate
        shell: pwsh
        run: pre-commit run --all-files detect-secrets

      - name: Normalize shell files to LF for shellcheck
        shell: pwsh
        run: |
          python -c @'
          from pathlib import Path

          targets = [Path('.shellcheckrc')] + list(Path('scripts').rglob('*.sh'))
          for path in targets:
              if not path.exists():
                  continue
              data = path.read_bytes()
              normalized = data.replace(b'\r\n', b'\n')
              if normalized != data:
                  path.write_bytes(normalized)
          '@

      - name: Lint shell scripts
        shell: pwsh
        run: pre-commit run --all-files shellcheck

      - name: Lint GitHub workflows
        shell: pwsh
        run: pre-commit run --all-files actionlint

      - name: Audit GitHub workflows
        shell: pwsh
        run: pre-commit run --all-files zizmor

      - name: Audit Python dependencies (pip-audit)
        shell: pwsh
        run: |
          python -m pip_audit --strict --desc --skip-editable

      - name: SAST scan (bandit)
        shell: pwsh
        run: |
          python -m pip install --quiet bandit
          # -ll = report medium- and high-severity only; -r recursive
          python -m bandit -r src/drift scripts -ll --format json --output bandit-report.json
          # Always print summary; exit non-zero only on actual findings
          python -m bandit -r src/drift scripts -ll --quiet

      - name: Upload Bandit SAST report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: bandit-sast-report-${{ matrix.os }}
          path: bandit-report.json
          retention-days: 30
