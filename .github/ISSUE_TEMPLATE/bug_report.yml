name: Bug Report
description: Something isn't working as expected
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in the details below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: To reproduce
      description: Steps or command to reproduce the issue.
      placeholder: |
        ```bash
        drift analyze --repo /path/to/project
        ```
    validations:
      required: true

  - type: input
    id: drift-version
    attributes:
      label: drift-analyzer version
      description: Output of `drift --version`
      placeholder: "2.0.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux (Ubuntu/Debian)
        - Linux (other)
        - macOS
        - Windows
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened. Include the full error output if applicable.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Stack trace, drift.yaml contents, anything else relevant.
    validations:
      required: false
