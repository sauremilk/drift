# Label definitions for the drift repository.
# These labels are maintained manually. If you add a label here,
# create it on GitHub as well: Settings → Labels.

- name: good first issue
  color: "0e8a16"
  description: Good entry point for new contributors

- name: help wanted
  color: "0e8a16"
  description: Extra attention is needed

- name: needs reproduction
  color: "fbca04"
  description: A minimal reproducing case is needed before work can start

- name: false-positive
  color: "d93f0b"
  description: Drift flags something that is not a real issue

- name: false-negative
  color: "d93f0b"
  description: Drift misses something that is a real issue

- name: signal-quality
  color: "0075ca"
  description: Improves precision, recall, or explainability of a signal

- name: docs
  color: "c5def5"
  description: Documentation improvements

- name: tests
  color: "bfd4f2"
  description: Test coverage or fixture improvements

- name: bug
  color: "d73a4a"
  description: Something is not working as expected

- name: enhancement
  color: "a2eeef"
  description: New feature or improvement

- name: not-prioritized
  color: "e4e4e4"
  description: Acknowledged but not currently prioritized

- name: stale
  color: "ededed"
  description: Inactive for 90+ days — will auto-close if no further activity

# --- Priority labels (Policy §7 hierarchy) ---
- name: "priority: high"
  color: "b60205"
  description: Credibility, signal precision, or finding clarity

- name: "priority: medium"
  color: "d93f0b"
  description: FP/FN reduction or adoptability improvements

- name: "priority: low"
  color: "fbca04"
  description: Comfort features, cosmetic docs, or trend improvements

# --- Size labels (review effort estimation) ---
- name: "size: small"
  color: "0e8a16"
  description: "Less than 50 changed lines — quick review"

- name: "size: medium"
  color: "1d76db"
  description: "50–200 changed lines"

- name: "size: large"
  color: "5319e7"
  description: "More than 200 changed lines — needs dedicated review slot"

# --- Review status labels ---
- name: "needs: rebase"
  color: "e99695"
  description: Merge conflicts — contributor must rebase on master

- name: "needs: tests"
  color: "e99695"
  description: Test coverage missing or incomplete

- name: "needs: evidence"
  color: "e99695"
  description: Feature evidence artifact required (see PR template)

- name: "needs: changes"
  color: "e99695"
  description: Reviewer requested changes
