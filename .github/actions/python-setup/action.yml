name: Set up Python for drift
description: >
  Installs the requested Python version, configures the pip cache, and installs
  drift's dev dependencies (pip install -e ".[dev]").  Keeps the SHA for
  actions/setup-python in a single canonical place so callers never drift.

inputs:
  python-version:
    description: "Python version to install (e.g. '3.12')."
    default: "3.12"
    required: false
  cache-dependency-path:
    description: "File used to key the pip cache."
    default: pyproject.toml
    required: false

runs:
  using: composite
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Install drift dev dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[dev]"
