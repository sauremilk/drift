# Drift Configuration — Minimal Example
# Copy to drift.yaml in your project root.
# Tip: Run `drift setup` for an interactive wizard that picks the right
# profile for your project, or `drift init -p <profile>` for presets.

# File patterns (glob syntax)
include:
  - "**/*.py"

exclude:
  - "**/node_modules/**"
  - "**/__pycache__/**"
  - "**/venv/**"
  - "**/.venv/**"
  - "**/dist/**"
  - "**/build/**"

# Auto-calibration rebalances signal weights at runtime.
# Drift ships sensible defaults — you don't need to tune weights on first use.
# Set to false to lock weights as configured.  default: true
auto_calibrate: true

# Optional: Architecture policies (uncomment to enable)
# policies:
#   layer_boundaries:
#     - name: "No DB imports in API layer"
#       from: "api/**"
#       deny_import:
#         - "db.*"
#         - "models.*"

# ──────────────────────────────────────────────────────────────────────
# For the full configuration reference with all 24 signal weights,
# performance tuning, and advanced policies, see:
# https://mick-gsk.github.io/drift/getting-started/configuration/
# ──────────────────────────────────────────────────────────────────────
  # AI attribution override: set a fixed ratio if your repo is fully AI-built
  # but Drift's automatic detection can't infer it from git history alone.
  # ai_attribution:
  #   manual_ratio: 0.95  # 0.0-1.0; omit for automatic detection

  # Language scanning settings
  # languages:
  #   typescript: true  # Enable TypeScript/TSX/JS/JSX analysis (requires tree-sitter)  default: false
  #                     # Install: pip install 'drift-analyzer[typescript]'

# CI severity gate: exit 1 if findings meet or exceed this level
# Options: critical, high, medium, low, none
# NOTE: The library default (when no drift.yaml is present) is "high".
# This example uses "none" as the recommended safe starting point for
# first rollouts. The GitHub Action also defaults to "none".
# Signals with weight: 0.0 are report-only: they run, appear in output,
# but do NOT contribute to the composite score and do NOT trigger this gate.
fail_on: none  # recommended for the first rollout pass

# Context-tagging dampening factor (ADR-006): findings annotated with
# # drift:context <tag> have their score multiplied by this value.
# Set to 1.0 to disable dampening (tags are metadata-only).  default: 1.0 (disabled)
# context_dampening: 0.5

# Delta gate (ADR-005): exit 1 if score increases by more than this value
# compared to the mean of the last N snapshots.  default: disabled
# fail_on_delta: 0.05
# fail_on_delta_window: 5   # Compare against mean of last N snapshots  default: 5

# Tunable thresholds
thresholds:
  similarity_threshold: 0.80   # MDS: Jaccard similarity cutoff
  min_function_loc: 10         # EDS: minimum function LOC
  min_complexity: 5            # EDS: minimum cyclomatic complexity (primary gate)
  recency_days: 14             # TVS: recency window
  volatility_z_threshold: 1.5  # TVS: z-score outlier threshold
  max_discovery_files: 10000   # Safety: hard cap for discovered source files
  diff_baseline_recommend_max_changed_files: 50          # diff: recommend baseline on broad working tree
  diff_baseline_recommend_max_new_findings: 100          # diff: recommend baseline on high finding volume
  diff_baseline_recommend_max_out_of_scope_findings: 50  # diff: recommend baseline when target scope is very noisy

# Per-path overrides: adjust weights or suppress signals for specific paths.
# Patterns use glob syntax; the most specific (longest) match wins.
# path_overrides:
#   "tests/**":
#     # Test code: suppress pattern fragmentation and architecture violations
#     exclude_signals:
#       - pattern_fragmentation
#       - architecture_violation
#   "legacy/**":
#     # Legacy code: lower weights, only flag critical issues
#     severity_gate: critical
#     weights:
#       pattern_fragmentation: 0.05
#       architecture_violation: 0.05
#   "scripts/**":
#     exclude_signals:
#       - explainability_deficit

# Deferred areas: mark known technical debt modules as "deferred".
# Unlike exclude, deferred areas are still analysed — but their findings
# are tagged deferred=true so CI gates and reports can treat them separately.
# This is useful for legacy modules that you plan to address later.
# deferred:
#   - pattern: "legacy/**"
#     reason: "Legacy auth module — scheduled for Q3 rewrite"
#     review_by: "2026-09-01"
#   - pattern: "vendor/**"
#     reason: "Vendored dependency — do not modify"

# Finding context policy: classify findings by path to separate operational
# production findings from non-operational contexts (fixtures/generated/docs/etc.).
# Non-operational contexts are excluded from fix-first/fix-plan prioritization
# by default, but can be included via API/CLI opt-in flags.
# finding_context:
#   default_context: production
#   non_operational_contexts:
#     - fixture
#     - generated
#     - migration
#     - docs
#   rules:
#     - pattern: "**/benchmarks/**"
#       context: fixture
#       precedence: 40
#     - pattern: "**/generated/**"
#       context: generated
#       precedence: 35
#     - pattern: "src/generated/safe/**"
#       context: production
#       precedence: 50

# Agent objective: declare the agent's current task so drift can provide
# targeted feedback, scope advisories, and quality tracking.
# agent:
#   goal: "Migrate payment module to new Stripe API"
#   strict_guardrails: true  # Optional: block unsafe MCP tool transitions
#   # Strict orchestration order:
#   # 1) drift_brief  2) drift_scan  3) drift_fix_plan
#   # 4) edits + drift_nudge  5) drift_diff  6) drift_session_end
#   out_of_scope:
#     - "legacy/"
#     - "tests/fixtures/"
#   success_criteria:
#     - "No new AVS findings in src/billing/"
#     - "All existing PFS findings resolved"
