# Drift Configuration Example
# Copy to drift.yaml in your project root

# File patterns (glob syntax)
include:
  - "**/*.py"
  - "**/*.ts"
  - "**/*.tsx"

exclude:
  # Build artifacts & environment
  - "**/node_modules/**"
  - "**/__pycache__/**"
  - "**/venv/**"
  - "**/.venv/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/.git/**"
  - "**/.tox/**"
  - "**/*.egg-info/**"
  # Documentation & example code — often contains intentional duplicates
  # that inflate drift scores without reflecting production architecture.
  # Remove these lines if you want to analyze docs/examples too.
  - "**/docs/**"
  - "**/docs_src/**"
  - "**/examples/**"

# Signal weights (should sum to ~1.0)
weights:
  pattern_fragmentation: 0.22
  architecture_violation: 0.22
  mutant_duplicate: 0.17
  temporal_volatility: 0.17
  explainability_deficit: 0.12
  doc_impl_drift: 0.00 # Report-only until README/ADR extraction is more selective
  system_misalignment: 0.10
  broad_exception_monoculture: 0.00  # Report-only — ADR-007 consistency proxy
  test_polarity_deficit: 0.00        # Report-only — ADR-007 consistency proxy
  guard_clause_deficit: 0.00         # Report-only — ADR-007 consistency proxy

# Architecture policies
policies:
  # Layer boundary enforcement
  layer_boundaries:
    - name: "No DB imports in API layer"
      from: "api/**"
      deny_import:
        - "db.*"
        - "models.*"
        - "repositories.*"

    - name: "No API imports in DB layer"
      from: "db/**"
      deny_import:
        - "api.*"
        - "routes.*"
        - "views.*"

  # Maximum allowed variants per pattern category
  max_pattern_variants:
    error_handling: 2
    data_access: 2
    api_endpoint: 3

# CI severity gate: exit 1 if findings meet or exceed this level
# Options: critical, high, medium, low
fail_on: none  # recommended for the first rollout pass

# Tunable thresholds
thresholds:
  similarity_threshold: 0.80   # MDS: Jaccard similarity cutoff
  min_function_loc: 10         # EDS: minimum function LOC
  min_complexity: 5            # EDS: minimum cyclomatic complexity (primary gate)
  recency_days: 14             # TVS: recency window
  volatility_z_threshold: 1.5  # TVS: z-score outlier threshold
