site_name: Drift — Codebase Coherence Analyzer
site_url: https://mick-gsk.github.io/drift/
repo_url: https://github.com/mick-gsk/drift
repo_name: mick-gsk/drift
site_description: Surface architectural drift, architecture degradation, and technical debt patterns in AI-assisted codebases

docs_dir: docs-site

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

hooks:
  - hooks/docs_version.py

plugins:
  - search
  - privacy:
      enabled: !ENV [CI, false]
  - social:
      enabled: !ENV [CI, false]
      cards_layout_options:
        background_color: "#009688"
  - git-revision-date-localized:
      enable_creation_date: true
      type: date

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/prove-viewer.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/drift.css

extra:
  # version + release_headline injected by hooks/docs_version.py at build time
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mick-gsk/drift
      name: Drift on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/drift-analyzer/
      name: Drift on PyPI

nav:
  - Home: index.md
  - Quickstart: guides/quickstart.md
  - Guides:
    - Agent-Workflow: guides/agent-workflow.md
    - Code-Health über Zeit: guides/health-over-time.md
    - CI/CD Integration: guides/ci-integration.md
  - Konzepte:
    - Signals: concepts/signals.md
    - Baseline: concepts/baseline.md
    - Scoring: concepts/scoring.md
    - Diagnose vs. Navigation: concepts/diagnosis-vs-navigation.md
  - Referenz:
    - Commands: reference/commands.md
    - Konfiguration: reference/configuration.md
