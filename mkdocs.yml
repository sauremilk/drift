site_name: Drift — AI Code Coherence Monitor
site_url: https://mick-gsk.github.io/drift/
repo_url: https://github.com/mick-gsk/drift
repo_name: mick-gsk/drift
site_description: Catches structural erosion from AI-generated code that passes all your tests — quality control layer for AI-assisted Python development

docs_dir: docs-site

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

hooks:
  - hooks/docs_version.py

plugins:
  - search
  - privacy:
      enabled: !ENV [CI, false]
  - social:
      enabled: !ENV [CI, false]
      cards_layout_options:
        background_color: "#009688"
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - redirects:
      redirect_maps:
        guides/quickstart.md: getting-started/quickstart.md
        guides/agent-workflow.md: getting-started/prompts.md
        guides/health-over-time.md: study.md
        guides/ci-integration.md: use-cases/ci-architecture-checks-sarif.md
        concepts/signals.md: algorithms/signals.md
        concepts/baseline.md: trust-evidence.md
        concepts/scoring.md: algorithms/scoring.md
        concepts/diagnosis-vs-navigation.md: product/example-findings.md
        reference/configuration.md: getting-started/configuration.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/prove-viewer.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/drift.css

extra:
  # version + release_headline injected by hooks/docs_version.py at build time
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mick-gsk/drift
      name: Drift on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/drift-analyzer/
      name: Drift on PyPI

