site_name: Drift — Codebase Coherence Analyzer
site_url: https://sauremilk.github.io/drift/
repo_url: https://github.com/sauremilk/drift
repo_name: sauremilk/drift
site_description: Surface architectural drift, architecture degradation, and technical debt patterns in AI-assisted codebases

docs_dir: docs-site

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Start Here: start-here.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Team Rollout: getting-started/team-rollout.md
      - Finding Triage: getting-started/finding-triage.md
      - Configuration: getting-started/configuration.md
      - Troubleshooting: getting-started/troubleshooting.md
  - Use Cases:
      - Overview: use-cases/index.md
      - Architecture Drift Detection for Python: use-cases/architecture-drift-python.md
      - Architectural Linter for AI Coding Teams: use-cases/architectural-linter-ai-teams.md
      - CI Architecture Checks with SARIF: use-cases/ci-architecture-checks-sarif.md
      - Technical Debt Detection for AI-Assisted Codebases: use-cases/technical-debt-ai-codebases.md
  - Comparisons:
      - Overview: comparisons/index.md
      - Drift vs Ruff: comparisons/drift-vs-ruff.md
      - Drift vs Semgrep and CodeQL: comparisons/drift-vs-semgrep-codeql.md
      - Drift vs Architecture Conformance Tools: comparisons/drift-vs-architecture-conformance.md
  - Integrations: integrations.md
  - How It Works:
      - Algorithm Deep Dive: algorithms/deep-dive.md
      - Signal Reference: algorithms/signals.md
      - Scoring Model: algorithms/scoring.md
  - Trust & Evaluation:
      - Stability and Release Status: stability.md
      - Trust and Evidence: trust-evidence.md
      - Benchmarking and Trust: benchmarking.md
      - Benchmark Study: study.md
  - Reference:
      - FAQ: faq.md
      - Glossary: glossary.md
      - API and Outputs: reference/api-outputs.md
      - Negative Context: reference/negative-context.md
      - Performance: reference/performance.md
  - Product:
      - Product Strategy: product-strategy.md
      - Example Findings: product/example-findings.md
      - Press and Brand: product/press-brand.md
  - Case Studies:
      - Overview: case-studies/index.md
      - FastAPI: case-studies/fastapi.md
      - Pydantic: case-studies/pydantic.md
      - Django: case-studies/django.md
  - Contributing: contributing.md
  - Changelog: changelog.md
