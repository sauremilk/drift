{% set name = "drift-analyzer" %}
{% set version = "2.5.1" %}

package:
  name: {{ name }}
  version: {{ version }}

# --- conda-forge feedstock ---
# To submit to conda-forge, create a feedstock repo with this recipe and
# replace the source section below with the PyPI sdist URL:
#
#   source:
#     url: https://pypi.io/packages/source/d/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
#     sha256: <sha256-of-sdist>
#
# Then open a PR at https://github.com/conda-forge/staged-recipes

# --- local build ---
source:
  path: ..

build:
  noarch: python
  number: 0
  entry_points:
    - drift = drift.cli:safe_main
    - drift-analyzer = drift.cli:safe_main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python >=3.11
    - pip
    - hatchling >=1.21
  run:
    - python >=3.11
    - click >=8.1
    - rich >=13.0
    - pyyaml >=6.0
    - pydantic >=2.0
    - gitpython >=3.1
    - networkx >=3.0

test:
  imports:
    - drift
    - drift.cli
    - drift.signals
    - drift.scoring
    - drift.output
  commands:
    - drift --help
    - drift --version
    - drift-analyzer --help
  requires:
    - pip
  commands_also:
    - pip check

about:
  home: https://github.com/mick-gsk/drift
  license: MIT
  license_file: LICENSE
  summary: >-
    Catches structural erosion from AI-generated code — the bugs that pass
    all your tests.
  description: |
    Drift is a static analyzer that detects and scores architectural erosion in
    Python codebases. It finds pattern fragmentation, architecture violations,
    near-duplicate code, and temporal volatility across modules. Output formats
    include Rich terminal, machine-readable JSON, and SARIF for CI integration.
    24 signal families (18 scoring-active, 6 report-only) are configurable via
    a YAML config file.
  doc_url: https://mick-gsk.github.io/drift/
  dev_url: https://github.com/mick-gsk/drift

extra:
  recipe-maintainers:
    - mick-gsk
