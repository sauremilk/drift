exclude:
  - ".venv/**"
  - ".venv-1/**"
  - "benchmarks/**"
  - "benchmark_results/**"
  - "data/**"
  - "community_flywheel_output/**"
  - "work_artifacts/**"
  - "tagesplanung/**"
  - "site/**"
  - "overrides/**"
  - "extensions/**/node_modules/**"
  - "examples/**"
  - "scripts/**"
  - "docs-site/**"
  - "tests/fixtures/**"
  - "hooks/**"
  - "demos/**"
  - ".drift/**"

calibration:
  enabled: true
  auto_recalibrate: true
  min_samples: 20
  correlation_window_days: 30
  weak_fp_window_days: 60
  decay_days: 90
  feedback_path: .drift/feedback.jsonl
  history_dir: .drift/history
  max_snapshots: 50
  bug_labels:
    - bug
    - regression
