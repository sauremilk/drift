# Drift configuration for the drift repo itself.
# This file is auto-loaded by drift when running in this directory.
# For a minimal starter config, see drift.example.yaml.
# For strict CI enforcement (fail on medium+), see drift.strict.yaml.

exclude:
  - ".venv/**"
  - ".venv-1/**"
  - "benchmarks/**"
  - "benchmark_results/**"
  - "data/**"
  - "community_flywheel_output/**"
  - "work_artifacts/**"
  - "tagesplanung/**"
  - "site/**"
  - "overrides/**"
  - "extensions/**/node_modules/**"
  - "examples/**"
  - "scripts/**"
  - "docs-site/**"
  - "tests/fixtures/**"
  - "hooks/**"
  - "demos/**"
  - ".drift/**"

path_overrides:
  "src/drift/signals":
    exclude_signals:
      - pattern_fragmentation
  "src/drift/integrations":
    exclude_signals:
      - pattern_fragmentation
  "src/drift/calibration":
    exclude_signals:
      - pattern_fragmentation
  "src/drift/api":
    exclude_signals:
      - pattern_fragmentation
  "docs/decisions/*":
    exclude_signals:
      - doc_impl_drift

calibration:
  enabled: true
  auto_recalibrate: true
  min_samples: 20
  correlation_window_days: 30
  weak_fp_window_days: 60
  decay_days: 90
  feedback_path: .drift/feedback.jsonl
  history_dir: .drift/history
  max_snapshots: 50
  bug_labels:
    - bug
    - regression
